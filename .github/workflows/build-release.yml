name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'gimp-plugin-u8/**'
      - 'titan-ultima/**'
      - '.github/workflows/build-release.yml'
    tags:
      - 'gimp/v*'
      - 'titan/v*'
  pull_request:
    branches: [main]
    paths:
      - 'gimp-plugin-u8/**'
      - 'titan-ultima/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── GIMP 3 plugin (Windows / MSYS2 MinGW64) ────────────────────────
  # GIMP 3, GEGL, and Babl are not yet in the MSYS2 remote repos, so we
  # bundle a minimal SDK (headers + import libs) in gimp3-sdk.tar.gz and
  # overlay it onto the MSYS2 prefix at build time.
  build-gimp-plugin:
    name: Build GIMP 3 Plugin (Windows)
    if: >-
      !startsWith(github.ref, 'refs/tags/')
      || startsWith(github.ref, 'refs/tags/gimp/v')
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-json-glib
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-atk
            mingw-w64-x86_64-lcms2

      - name: Install bundled GIMP 3 SDK
        working-directory: gimp-plugin-u8
        run: |
          echo "=== Extracting GIMP 3 SDK ==="
          tar xzf gimp3-sdk.tar.gz
          cp -r gimp3-sdk/include/* /mingw64/include/
          cp gimp3-sdk/lib/*.dll.a /mingw64/lib/
          # Strip Requires.private from bundled .pc files to avoid
          # chasing transitive deps only needed for static linking
          sed -i '/^Requires\.private:/d' gimp3-sdk/lib/pkgconfig/*.pc
          cp gimp3-sdk/lib/pkgconfig/*.pc /mingw64/lib/pkgconfig/
          rm -rf gimp3-sdk
          echo "=== Verify SDK installed ==="
          pkg-config --modversion gimp-3.0 gegl-0.4 babl-0.1

      - name: Build u8shp plugin
        working-directory: gimp-plugin-u8
        run: |
          echo "=== Building with pkg-config ==="
          gcc -o u8shp.exe u8shp.c \
            $(pkg-config --cflags gimp-3.0 gimpui-3.0) \
            $(pkg-config --libs gimp-3.0 gimpui-3.0)
          ls -la u8shp.exe
          file u8shp.exe

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: u8shp-windows-x64
          path: gimp-plugin-u8/u8shp.exe

  # ── Titan-Ultima Python package ─────────────────────────────────────
  build-titan:
    name: Build Titan-Ultima Python Package
    if: >-
      !startsWith(github.ref, 'refs/tags/')
      || startsWith(github.ref, 'refs/tags/titan/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        working-directory: titan-ultima
        run: python -m build

      - name: List build output
        working-directory: titan-ultima
        run: ls -la dist/

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: titan-ultima-dist
          path: titan-ultima/dist/*

  # ── Release: GIMP plugin ───────────────────────────────────────────
  release-gimp:
    name: Release GIMP Plugin
    needs: [build-gimp-plugin]
    if: startsWith(github.ref, 'refs/tags/gimp/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: u8shp-windows-x64
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "GIMP Plugin ${{ github.ref_name }}"
          generate_release_notes: true
          files: release-assets/u8shp.exe

  # ── Release: Titan-Ultima ──────────────────────────────────────────
  release-titan:
    name: Release Titan-Ultima
    needs: [build-titan]
    if: startsWith(github.ref, 'refs/tags/titan/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: titan-ultima-dist
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Titan-Ultima ${{ github.ref_name }}"
          generate_release_notes: true
          files: release-assets/*
